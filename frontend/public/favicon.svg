<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Deep space background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0d0a2e"/>
      <stop offset="100%" stop-color="#000008"/>
    </radialGradient>

    <!-- Letter gradient: electric blue → violet -->
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="55%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="50%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft inner glow for letters -->
    <filter id="letterGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to circle -->
    <clipPath id="circleClip">
      <circle cx="32" cy="32" r="31"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <circle cx="32" cy="32" r="28" fill="none"
          stroke="#3b82f6" stroke-width="0.5" opacity="0.25"/>

  <!-- Outer orbital ring (dashed) -->
  <circle cx="32" cy="32" r="30"
          fill="none"
          stroke="url(#ringGrad)"
          stroke-width="1.8"
          stroke-dasharray="6 3"
          stroke-linecap="round"
          filter="url(#glow)"
          opacity="0.9"/>

  <!-- 4 orbital node dots on the ring -->
  <!-- Top -->
  <circle cx="32" cy="2"  r="1.6" fill="#38bdf8" filter="url(#glow)" opacity="0.95"/>
  <!-- Right -->
  <circle cx="62" cy="32" r="1.6" fill="#818cf8" filter="url(#glow)" opacity="0.95"/>
  <!-- Bottom -->
  <circle cx="32" cy="62" r="1.6" fill="#34d399" filter="url(#glow)" opacity="0.95"/>
  <!-- Left -->
  <circle cx="2"  cy="32" r="1.6" fill="#60a5fa" filter="url(#glow)" opacity="0.95"/>

  <!-- Inner circle -->
  <circle cx="32" cy="32" r="22"
          fill="none"
          stroke="#4f46e5"
          stroke-width="0.6"
          opacity="0.35"/>

  <!-- "MA" monogram — custom geometric lettering -->
  <!-- M: two diagonal strokes + center V -->
  <!-- Left leg of M -->
  <line x1="13" y1="41" x2="18" y2="24" stroke="url(#letterGrad)" stroke-width="3.2" stroke-linecap="round" filter="url(#letterGlow)"/>
  <!-- Right leg of M -->
  <line x1="29" y1="41" x2="24" y2="24" stroke="url(#letterGrad)" stroke-width="3.2" stroke-linecap="round" filter="url(#letterGlow)"/>
  <!-- Center V of M (down to midpoint) -->
  <polyline points="18,24 21,34 24,24" fill="none" stroke="url(#letterGrad)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#letterGlow)"/>

  <!-- Thin separator line between M and A -->
  <line x1="31.5" y1="24" x2="31.5" y2="41" stroke="#4f46e5" stroke-width="0.7" opacity="0.5"/>

  <!-- A: two diagonals + crossbar -->
  <!-- Left diagonal of A -->
  <line x1="35" y1="41" x2="43" y2="24" stroke="url(#letterGrad)" stroke-width="3.2" stroke-linecap="round" filter="url(#letterGlow)"/>
  <!-- Right diagonal of A -->
  <line x1="51" y1="41" x2="43" y2="24" stroke="url(#letterGrad)" stroke-width="3.2" stroke-linecap="round" filter="url(#letterGlow)"/>
  <!-- Crossbar of A -->
  <line x1="37.5" y1="34.5" x2="48.5" y2="34.5" stroke="url(#letterGrad)" stroke-width="2.6" stroke-linecap="round" filter="url(#letterGlow)"/>

  <!-- Bottom accent line -->
  <line x1="20" y1="44" x2="44" y2="44"
        stroke="url(#ringGrad)"
        stroke-width="1"
        stroke-linecap="round"
        opacity="0.5"/>

  <!-- Tiny star accents -->
  <circle cx="8"  cy="10" r="0.7" fill="#a78bfa" opacity="0.8"/>
  <circle cx="56" cy="8"  r="0.9" fill="#60a5fa" opacity="0.8"/>
  <circle cx="54" cy="55" r="0.7" fill="#34d399" opacity="0.7"/>
  <circle cx="10" cy="54" r="0.6" fill="#818cf8" opacity="0.7"/>
</svg>